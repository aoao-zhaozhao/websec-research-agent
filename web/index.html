<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Security Scanner v1.7.1</title>
<style>
  :root {
    --bg: #111311;
    --panel: #181b18;
    --panel-2: #20241f;
    --line: #343a33;
    --text: #eef1ea;
    --muted: #a6ada3;
    --soft: #cfd6ca;
    --green: #55c67a;
    --blue: #67a8ff;
    --amber: #e4b94f;
    --red: #ec6a6a;
    --purple: #b38cff;
    --shadow: 0 18px 50px rgba(0, 0, 0, .22);
    --radius: 8px;
  }

  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0;
  }
  button, input, textarea {
    font: inherit;
  }
  button {
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
    min-height: 38px;
    border-radius: 7px;
    cursor: pointer;
  }
  button:hover { border-color: #586052; }
  button:disabled { opacity: .45; cursor: not-allowed; }
  code, pre {
    font-family: "JetBrains Mono", "Cascadia Code", Consolas, monospace;
  }

  .app {
    height: 100vh;
    min-height: 0;
    overflow: hidden;
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr);
  }
  .sidebar {
    border-right: 1px solid var(--line);
    background: #151714;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .brand {
    padding: 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .brand h1 {
    margin: 0;
    font-size: 15px;
    line-height: 1.2;
    font-weight: 700;
  }
  .brand-actions { display: flex; gap: 8px; }
  .version {
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
  }
  .icon-btn {
    width: 38px;
    padding: 0;
    display: grid;
    place-items: center;
    font-weight: 700;
  }
  .sessions {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }
  .session {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 6px;
    margin-bottom: 8px;
  }
  .session-main {
    min-width: 0;
    text-align: left;
    padding: 10px;
    background: transparent;
  }
  .session.active .session-main {
    background: var(--panel-2);
    border-color: #64705d;
  }
  .session-actions { display: flex; gap: 4px; align-items: center; }
  .session-actions .icon-btn { width: 30px; min-height: 30px; font-size: 13px; }
  .session-title {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 13px;
  }
  .session-meta {
    margin-top: 5px;
    color: var(--muted);
    font-size: 11px;
  }
  .side-footer {
    border-top: 1px solid var(--line);
    padding: 10px;
    display: grid;
    gap: 8px;
  }
  .main {
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto;
    background: var(--bg);
  }
  .topbar {
    border-bottom: 1px solid var(--line);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    background: rgba(24, 27, 24, .92);
  }
  .status {
    display: flex;
    align-items: center;
    gap: 9px;
    color: var(--muted);
    font-size: 13px;
    white-space: nowrap;
  }
  .mobile-only { display: none; }
  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--red);
  }
  .dot.on { background: var(--green); }
  .steps {
    display: flex;
    gap: 6px;
    min-width: 0;
    overflow-x: auto;
  }
  .step {
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 6px 9px;
    border-radius: 999px;
    font-size: 12px;
    white-space: nowrap;
  }
  .step.active {
    color: #07120b;
    background: var(--green);
    border-color: var(--green);
  }
  .step.done {
    color: var(--soft);
    border-color: #4a5647;
  }
  .workspace {
    min-height: 0;
    overflow: hidden;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
  }
  .conversation {
    min-height: 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 18px;
  }
  .rail {
    border-left: 1px solid var(--line);
    background: rgba(21, 23, 20, .7);
    overflow-y: auto;
    padding: 14px;
  }
  .rail h2 {
    font-size: 13px;
    margin: 4px 0 10px;
    color: var(--soft);
  }
  .rail-section + .rail-section { margin-top: 18px; }
  .scan-summary {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 7px;
    margin-bottom: 10px;
  }
  .scan-stat {
    min-width: 0;
    border: 1px solid var(--line);
    background: #121512;
    padding: 8px;
  }
  .scan-stat strong { display: block; font-size: 16px; line-height: 1.15; }
  .scan-stat span { display: block; color: var(--muted); font-size: 11px; margin-top: 4px; }
  .scan-target {
    color: var(--soft);
    font: 12px "JetBrains Mono", "Cascadia Code", Consolas, monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin: 0 0 10px;
  }
  .stage-list { display: grid; gap: 5px; }
  .stage-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 7px 8px;
    border-left: 3px solid var(--line);
    background: #121512;
    color: var(--muted);
    font-size: 12px;
  }
  .stage-row.active { border-left-color: var(--amber); color: var(--text); }
  .stage-row.completed { border-left-color: var(--green); color: var(--soft); }
  .stage-row.stopped, .stage-row.failed { border-left-color: var(--red); color: #ffd2d2; }
  .stage-state { color: var(--muted); font-size: 11px; }
  .empty {
    color: var(--muted);
    font-size: 13px;
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 14px;
  }
  .message {
    max-width: 980px;
    margin: 0 0 14px;
    display: flex;
  }
  .message.user { justify-content: flex-end; }
  .bubble {
    max-width: min(860px, 92%);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 13px 15px;
    line-height: 1.6;
    font-size: 14px;
    overflow-wrap: anywhere;
    box-shadow: var(--shadow);
  }
  .user .bubble {
    background: #243527;
    border-color: #456348;
  }
  .assistant .bubble {
    background: var(--panel);
  }
  .assistant .bubble h1,
  .assistant .bubble h2,
  .assistant .bubble h3 {
    margin: 12px 0 8px;
    font-size: 16px;
  }
  .assistant .bubble p { margin: 8px 0; }
  .assistant .bubble ul { padding-left: 20px; }
  .assistant .bubble pre {
    overflow: auto;
    background: #0d0f0d;
    border: 1px solid var(--line);
    padding: 12px;
    border-radius: 6px;
  }
  .assistant .bubble .table-wrap { overflow-x: auto; margin: 10px 0; }
  .assistant .bubble table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .assistant .bubble th, .assistant .bubble td { border: 1px solid var(--line); padding: 7px 8px; text-align: left; vertical-align: top; }
  .assistant .bubble th { background: #20241f; color: var(--soft); }
  .assistant .bubble code {
    background: #0d0f0d;
    border: 1px solid #2b312a;
    border-radius: 4px;
    padding: 1px 4px;
  }
  .reasoning .bubble { background: #161a20; border-color: #394757; box-shadow: none; }
  .reasoning summary { color: var(--blue); font-size: 13px; }
  .reasoning-body {
    margin-top: 9px;
    max-height: 240px;
    overflow: auto;
    white-space: pre-wrap;
    color: var(--soft);
    font: 12px/1.55 "JetBrains Mono", "Cascadia Code", Consolas, monospace;
  }
  dialog {
    width: min(460px, calc(100vw - 28px));
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 0;
  }
  dialog::backdrop { background: rgba(0, 0, 0, .62); }
  .config-form { padding: 16px; display: grid; gap: 13px; }
  .config-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .config-head h2 { margin: 0; font-size: 15px; }
  .config-field { display: grid; gap: 6px; color: var(--soft); font-size: 13px; }
  .config-field input, .config-field select {
    min-height: 36px;
    color: var(--text);
    background: #0d0f0d;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 9px;
  }
  .config-check { display: flex; align-items: center; gap: 8px; color: var(--soft); font-size: 13px; }
  .config-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }
  .config-status { min-height: 16px; color: var(--muted); font-size: 12px; }
  .tools-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .78);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .tools-overlay.open { display: flex; }
  .tools-panel {
    width: min(960px, calc(100vw - 48px));
    max-height: calc(100vh - 48px);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: 0 24px 80px rgba(0, 0, 0, .5);
    display: grid;
    grid-template-rows: auto auto minmax(0, 1fr);
    overflow: hidden;
  }
  .tools-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .tools-header h2 { margin: 0; font-size: 16px; }
  .tools-header .count { color: var(--muted); font-size: 13px; }
  .tools-search {
    padding: 10px 18px;
    border-bottom: 1px solid var(--line);
  }
  .tools-search input {
    width: 100%;
    min-height: 34px;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: #0d0f0d;
    color: var(--text);
    padding: 7px 12px;
    font-size: 13px;
    outline: none;
  }
  .tools-search input:focus { border-color: var(--green); }
  .tools-body {
    overflow-y: auto;
    padding: 14px 18px;
  }
  .tool-group { margin-bottom: 18px; }
  .tool-group h3 {
    font-size: 13px;
    color: var(--soft);
    margin: 0 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tool-group h3 .count {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
  }
  .tool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 7px;
  }
  .tool-chip {
    border: 1px solid var(--line);
    background: var(--panel-2);
    border-radius: 7px;
    padding: 9px 11px;
    cursor: default;
    transition: border-color .15s;
  }
  .tool-chip:hover { border-color: #586052; }
  .tool-chip .chip-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    font-family: "JetBrains Mono", "Cascadia Code", Consolas, monospace;
  }
  .tool-chip .chip-desc {
    font-size: 12px;
    color: var(--muted);
    margin-top: 5px;
    line-height: 1.4;
  }
  .tool-chip .chip-params {
    margin-top: 7px;
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }
  .tool-chip .chip-param {
    font-size: 11px;
    background: #0d0f0d;
    border: 1px solid #2b312a;
    border-radius: 4px;
    padding: 2px 6px;
    color: var(--soft);
    font-family: "JetBrains Mono", "Cascadia Code", Consolas, monospace;
  }
  .tool-chip .chip-param.required { border-color: var(--amber); color: var(--amber); }
  .tools-footer {
    padding: 10px 18px;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 11px;
    display: flex;
    justify-content: space-between;
  }
  .metrics-panel {
    width: min(1040px, calc(100vw - 48px));
    max-height: calc(100vh - 48px);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: 0 24px 80px rgba(0, 0, 0, .5);
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    overflow: hidden;
  }
  .metrics-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .metrics-header h2 { margin: 0; font-size: 16px; }
  .metrics-header-actions { display: flex; gap: 8px; }
  .metrics-body { min-height: 0; overflow-y: auto; padding: 18px; }
  .metrics-section + .metrics-section { margin-top: 22px; }
  .metrics-section h3 { margin: 0 0 9px; color: var(--soft); font-size: 13px; }
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    border: 1px solid var(--line);
    background: #121512;
  }
  .metric-item { min-width: 0; padding: 11px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .metric-item:nth-child(3n) { border-right: 0; }
  .metric-value { color: var(--text); font-size: 20px; font-weight: 700; line-height: 1.15; overflow-wrap: anywhere; }
  .metric-label { margin-top: 5px; color: var(--soft); font-size: 12px; }
  .metric-note { margin-top: 3px; color: var(--muted); font-size: 11px; }
  .metrics-table-wrap { overflow-x: auto; }
  .metrics-table { width: 100%; min-width: 600px; border-collapse: collapse; font-size: 12px; }
  .metrics-table th, .metrics-table td { border-bottom: 1px solid var(--line); padding: 8px; text-align: left; }
  .metrics-table th { color: var(--muted); font-weight: 500; }
  .run-list { border-top: 1px solid var(--line); }
  .run-row {
    width: 100%; min-height: 0; border: 0; border-bottom: 1px solid var(--line); border-radius: 0;
    background: transparent; padding: 10px 0; display: grid; grid-template-columns: minmax(0, 1fr) auto;
    gap: 12px; text-align: left;
  }
  .run-row > span:first-child { min-width: 0; }
  .run-row:hover, .run-row.active { background: #20241f; }
  .run-title { display: block; color: var(--soft); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .run-meta { display: block; margin-top: 4px; color: var(--muted); font-size: 11px; }
  .run-status { align-self: center; color: var(--soft); font-size: 11px; text-transform: uppercase; white-space: nowrap; }
  .run-status.failed { color: var(--red); }
  .run-status.completed { color: var(--green); }
  .metrics-detail { border-top: 1px solid var(--line); padding-top: 12px; }
  .metrics-detail-head { display: flex; justify-content: space-between; gap: 12px; color: var(--soft); font-size: 13px; }
  .action-row { border-bottom: 1px solid var(--line); padding: 9px 0; }
  .action-row-head { display: flex; justify-content: space-between; gap: 10px; font: 12px "JetBrains Mono", "Cascadia Code", Consolas, monospace; }
  .action-row-meta { margin-top: 4px; color: var(--muted); font-size: 11px; }
  .action-row details { margin-top: 6px; }
  .action-row .tool-body { max-height: 150px; }
  .tool-card {
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: var(--radius);
    padding: 11px;
    margin-bottom: 10px;
  }
  .tool-card.running { border-color: var(--amber); }
  .tool-card.done { border-color: #466649; }
  .tool-card.error { border-color: var(--red); }
  .tool-card.stopped { border-color: #6b7280; }
  .tool-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .tool-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }
  .badge {
    font-size: 11px;
    color: #10130f;
    background: var(--amber);
    padding: 3px 7px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .badge.done { background: var(--green); }
  .badge.error { background: var(--red); color: #fff; }
  .badge.stopped { background: #9ca3af; color: #111827; }
  details {
    margin-top: 9px;
  }
  summary {
    cursor: pointer;
    color: var(--muted);
    font-size: 12px;
  }
  .tool-body {
    margin-top: 8px;
    max-height: 260px;
    overflow: auto;
    white-space: pre-wrap;
    color: var(--soft);
    font-size: 12px;
    line-height: 1.5;
    background: #0d0f0d;
    border: 1px solid #2b312a;
    border-radius: 6px;
    padding: 9px;
  }
  .finding-card {
    border: 1px solid var(--line);
    border-left: 4px solid var(--blue);
    background: var(--panel);
    border-radius: var(--radius);
    padding: 10px;
    margin-bottom: 10px;
    font-size: 13px;
    line-height: 1.45;
  }
  .finding-card.high { border-left-color: var(--red); }
  .finding-card.medium { border-left-color: var(--amber); }
  .finding-card.low { border-left-color: var(--green); }
  .finding-card.info { border-left-color: var(--blue); }
  .finding-card .finding-meta { color: var(--muted); font-size: 11px; margin-top: 6px; }
  .finding-card summary { color: var(--soft); }
  .finding-card .tool-body { max-height: 180px; }
  .composer {
    border-top: 1px solid var(--line);
    padding: 12px 18px;
    background: rgba(24, 27, 24, .95);
    z-index: 2;
  }
  .input-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 42px 42px 42px;
    gap: 9px;
  }
  #userInput {
    min-height: 42px;
    max-height: 130px;
    resize: vertical;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #0d0f0d;
    color: var(--text);
    padding: 11px 12px;
    outline: none;
  }
  #userInput:focus { border-color: var(--green); }
  .spin {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid rgba(255,255,255,.25);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 980px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .workspace { grid-template-columns: 1fr; grid-template-rows: minmax(0, 1fr) auto; overflow-y: auto; }
    .rail { border-left: 0; border-top: 1px solid var(--line); max-height: 44vh; }
    .topbar { align-items: flex-start; flex-direction: column; }
    .mobile-only { display: grid; }
  }
  @media (max-width: 620px) {
    .conversation { padding: 12px; }
    .bubble { max-width: 100%; }
    .steps { width: 100%; }
    .metrics-panel { width: calc(100vw - 24px); max-height: calc(100vh - 24px); }
    .metrics-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .metric-item:nth-child(3n) { border-right: 1px solid var(--line); }
    .metric-item:nth-child(2n) { border-right: 0; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div>
        <h1>Web Security Scanner</h1>
        <div class="version">v1.7.1</div>
      </div>
        <div class="brand-actions">
          <button class="icon-btn" id="metricsBtn" title="运行指标与历史">&#128202;</button>
        <button class="icon-btn" id="toolsBtn" title="工具目录 (38)">📦</button>
        <button class="icon-btn" id="settingsBtn" title="模型与思考设置">⚙</button>
        <button class="icon-btn" id="newSessionBtn" title="新建会话">+</button>
      </div>
    </div>
    <div class="sessions" id="sessions"></div>
    <div class="side-footer">
      <button id="exportSessionBtn" title="导出当前扫描">⇩</button>
      <button id="clearHistoryBtn" title="清空本地会话">清空历史</button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="steps" id="steps">
        <span class="step" data-stage="scope">范围</span>
        <span class="step" data-stage="crawl">爬取</span>
        <span class="step" data-stage="enumerate">枚举</span>
        <span class="step" data-stage="verify">验证</span>
        <span class="step" data-stage="knowledge">知识库</span>
        <span class="step" data-stage="report">报告</span>
      </div>
      <div class="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">未连接</span>

function loadSessions() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY) || '[]';
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    return parsed.map(session => ({
      ...session,
      messages: Array.isArray(session.messages) ? session.messages : [],
      tools: Array.isArray(session.tools) ? session.tools : [],
      scan: session.scan || null
    }));
  } catch {
    return [];
  }
}

function saveSessions() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions.slice(0, 30)));
  if (activeId) localStorage.setItem(`${STORAGE_KEY}-active`, activeId);
  renderSessions();
}

function sessionFromServer(session) {
  const runs = Array.isArray(session.runs) ? session.runs : [];
  return {
    ...session,
    createdAt: Date.parse(session.created_at || '') || Date.now(),
    messages: Array.isArray(session.messages) ? session.messages.map(message => ({
      role: message.role,
      content: message.content,
      at: Date.parse(message.created_at || '') || Date.now()
    })) : [],
    tools: runs.flatMap(run => (run.actions || []).map(action => ({
      id: action.tool_run_id,
      name: action.tool_name,
      input: action.input_data,
      output: action.output_excerpt,
      result: action.result_data,
      durationMs: action.duration_ms,
      startedAt: Date.parse(action.started_at || '') || Date.now(),
      finishedAt: Date.parse(action.finished_at || '') || null
    }))),
    scan: null
  };
}

async function createSession() {
  const response = await fetch('/api/conversations', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: '新扫描' })
  });
  if (!response.ok) throw new Error('无法创建会话');
  const session = sessionFromServer(await response.json());
  sessions.unshift(session);
  saveSessions();
  return session;
}

async function persistSessionTitle(session) {
  const response = await fetch(`/api/conversations/${encodeURIComponent(session.id)}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: session.title })
  });
  if (!response.ok) throw new Error('保存会话名称失败');
}

function activeSession() {
  let session = sessions.find(item => item.id === activeId);
  if (!session) {
    session = { id: '', title: '新扫描', messages: [], tools: [], scan: null };
  }
  return session;
}

async function selectSession(sessionId) {
  const response = await fetch(`/api/conversations/${encodeURIComponent(sessionId)}`);
  if (!response.ok) throw new Error('无法读取会话');
  const hydrated = sessionFromServer(await response.json());
  const index = sessions.findIndex(item => item.id === sessionId);
  if (index >= 0) sessions[index] = hydrated;
  else sessions.unshift(hydrated);
  activeId = sessionId;
  currentAssistant = null;
  currentAssistantRaw = '';
  toolCards.clear();
  saveSessions();
  renderConversation();
}

async function bootstrapSessions() {
  const legacySessions = loadSessions();
  if (legacySessions.length) {
    await fetch('/api/conversations/import', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessions: legacySessions })
    });
  }
  const response = await fetch('/api/conversations');
  if (!response.ok) throw new Error('无法读取会话列表');
  const data = await response.json();
  sessions = (data.conversations || []).map(sessionFromServer);
  const cachedId = localStorage.getItem(`${STORAGE_KEY}-active`);
  if (!sessions.length) {
    const session = await createSession();
    activeId = session.id;
  } else {
    await selectSession(sessions.some(session => session.id === cachedId) ? cachedId : sessions[0].id);
  }
  renderSessions();
  renderConversation();
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function renderMarkdown(text) {
  const lines = String(text || '').replaceAll('\r\n', '\n').split('\n');
  const html = [];
  let paragraph = [];
  let list = [];
  const inline = value => escapeHtml(value)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  const flushParagraph = () => {
    if (paragraph.length) html.push(`<p>${paragraph.map(inline).join('<br>')}</p>`);
    paragraph = [];
  };
  const flushList = () => {
    if (list.length) html.push(`<ul>${list.map(item => `<li>${inline(item)}</li>`).join('')}</ul>`);
    list = [];
  };
  for (let index = 0; index < lines.length; index += 1) {
    const line = lines[index];
    if (line.startsWith('```')) {
      flushParagraph(); flushList();
      const code = [];
      while (++index < lines.length && !lines[index].startsWith('```')) code.push(lines[index]);
      html.push(`<pre><code>${escapeHtml(code.join('\n'))}</code></pre>`);
      continue;
    }
    const heading = line.match(/^(#{1,3})\s+(.+)$/);
    if (heading) {
      flushParagraph(); flushList();
      const level = heading[1].length;
      html.push(`<h${level}>${inline(heading[2])}</h${level}>`);
      continue;
    }
    if (/^[-*]\s+/.test(line)) {
      flushParagraph();
      list.push(line.replace(/^[-*]\s+/, ''));
      continue;
    }
    if (/^\|.+\|\s*$/.test(line) && /^\|?\s*:?-{3,}/.test(lines[index + 1] || '')) {
      flushParagraph(); flushList();
      const cells = value => value.trim().replace(/^\||\|$/g, '').split('|').map(cell => cell.trim());
      const headers = cells(line);
      index += 2;
      const rows = [];
      while (index < lines.length && /^\|.+\|\s*$/.test(lines[index])) rows.push(cells(lines[index++]));
      index -= 1;
      html.push(`<div class="table-wrap"><table><thead><tr>${headers.map(cell => `<th>${inline(cell)}</th>`).join('')}</tr></thead><tbody>${rows.map(row => `<tr>${headers.map((_, cell) => `<td>${inline(row[cell] || '')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`);
      continue;
    }
    if (!line.trim()) {
      flushParagraph(); flushList();
      continue;
    }
    flushList();
    paragraph.push(line);
  }
  flushParagraph(); flushList();
  return html.join('');
}

function setStatus(connected, text) {
  statusDot.className = `dot ${connected ? 'on' : ''}`;
  statusText.textContent = text;
}

function setBusy(next) {
  busy = next;
  sendBtn.disabled = next;
  stopBtn.disabled = !next;
  input.disabled = next;
  sendBtn.innerHTML = next ? '<span class="spin"></span>' : '▶';
}

function addMessage(role, content, persist = true) {
  const empty = conversation.querySelector('.empty');
  if (empty) empty.remove();
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = role === 'assistant' ? renderMarkdown(content) : escapeHtml(content);
  wrap.appendChild(bubble);
  conversation.appendChild(wrap);
  conversation.scrollTop = conversation.scrollHeight;
  if (persist) {
    activeSession().messages.push({ role, content, at: Date.now() });
    saveSessions();
  }
  return bubble;
}

function appendReasoning(content) {
  if (!content) return;
  if (!currentReasoning) {
    const wrap = document.createElement('div');
    wrap.className = 'message assistant reasoning';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const details = document.createElement('details');
    details.open = true;
    details.innerHTML = '<summary>模型思考</summary><div class="reasoning-body"></div>';
    bubble.appendChild(details);
    wrap.appendChild(bubble);
    conversation.appendChild(wrap);
    currentReasoning = details.querySelector('.reasoning-body');
    currentReasoningRaw = '';
  }
  currentReasoningRaw += content;
  currentReasoning.textContent = currentReasoningRaw;
  conversation.scrollTop = conversation.scrollHeight;
}

function resetReasoning() {
  currentReasoning = null;
  currentReasoningRaw = '';
}

function renderConversation() {
  conversation.innerHTML = '';
  const session = activeSession();
  if (!session.messages.length) {
    conversation.innerHTML = '<div class="empty">输入目标 URL 或审计问题后开始。</div>';
  } else {
    session.messages.forEach(msg => addMessage(msg.role, msg.content, false));
  }
  renderToolHistory();
  renderFindingCards(session.scan?.findings || []);
  renderScanState(session.scan);
  updateStages(session.scan);
}

function renderSessions() {
  sessionsEl.innerHTML = '';
  sessions.forEach(session => {
    const row = document.createElement('div');
    row.className = `session ${session.id === activeId ? 'active' : ''}`;
    const btn = document.createElement('button');
    btn.className = 'session-main';
    btn.innerHTML = `
      <div class="session-title">${escapeHtml(session.title)}</div>
      <div class="session-meta">${new Date(session.createdAt).toLocaleString()}</div>
    `;
    btn.onclick = () => selectSession(session.id).catch(error => window.alert(error.message || '无法切换会话'));
    const actions = document.createElement('div');
    actions.className = 'session-actions';
    actions.innerHTML = `
      <button class="icon-btn" title="重命名">✎</button>
      <button class="icon-btn" title="删除">×</button>
    `;
    actions.children[0].onclick = event => {
      event.stopPropagation();
      renameSession(session.id).catch(error => window.alert(error.message || '重命名失败'));
    };
    actions.children[1].onclick = event => {
      event.stopPropagation();
      deleteSession(session.id).catch(error => window.alert(error.message || '删除会话失败'));
    };
    row.append(btn, actions);
    sessionsEl.appendChild(row);
  });
}

function renderToolHistory() {
  const tools = activeSession().tools || [];
  toolRail.innerHTML = '';
  toolCards.clear();
  if (!tools.length) {
    toolRail.className = 'empty';
    toolRail.textContent = '等待扫描任务。';
    return;
  }
  toolRail.className = '';
  tools.forEach(tool => {
    const card = buildToolCard(tool);
    toolRail.appendChild(card);
    toolCards.set(tool.id, card);
  });
}

function buildToolCard(tool) {
  const state = tool.output ? (tool.result?.status === 'error' ? 'error' : 'done') : 'running';
  const duration = tool.durationMs != null ? ` · ${formatDuration(tool.durationMs)}` : '';
  const card = document.createElement('div');
  card.className = `tool-card ${state}`;
  card.dataset.id = tool.id;
  card.innerHTML = `
    <div class="tool-head">
      <div class="tool-name">${escapeHtml(tool.name)}${duration}</div>
      <span class="badge ${state}">${state === 'done' ? '完成' : state === 'error' ? '失败' : '执行中'}</span>
    </div>
    <details>
      <summary>参数</summary>
      <div class="tool-body">${escapeHtml(formatPayload(tool.input))}</div>
    </details>
    ${tool.output ? `<details open><summary>结果摘要</summary><div class="tool-body">${escapeHtml(tool.output)}</div></details>` : ''}
    ${tool.result ? `<details><summary>结构化证据</summary><div class="tool-body">${escapeHtml(formatPayload(tool.result))}</div></details>` : ''}
  `;
  return card;
}

function formatPayload(value) {
  if (value == null) return '';
  if (typeof value === 'string') return value;
  try {
    return JSON.stringify(value, null, 2);
  } catch {
    return String(value);
  }
}

function onToolStart(msg) {
  if (toolRail.classList.contains('empty')) {
    toolRail.className = '';
    toolRail.innerHTML = '';
  }
  const tool = {
    id: msg.id || `${msg.name}-${Date.now()}`,
    name: msg.name,
    stage: msg.stage || '',
    input: msg.input,
    output: '',
    result: null,
    startedAt: Date.now()
  };
  activeSession().tools.push(tool);
  saveSessions();
  const card = buildToolCard(tool);
  toolRail.prepend(card);
  toolCards.set(tool.id, card);
}

function onToolEnd(msg) {
  const id = msg.id;
  const sessionTool = activeSession().tools.find(tool => tool.id === id);
  if (sessionTool) {
    sessionTool.output = msg.output || '';
    sessionTool.result = msg.result || null;
    sessionTool.finishedAt = Date.now();
    saveSessions();
  }
  const card = toolCards.get(id);
  if (card) {
    const failed = msg.result?.status === 'error';
    card.className = `tool-card ${failed ? 'error' : 'done'}`;
    const badge = card.querySelector('.badge');
    if (badge) {
      badge.className = `badge ${failed ? 'error' : 'done'}`;
      badge.textContent = failed ? '失败' : '完成';
    }
    if (!card.querySelector('.result-details')) {
      const details = document.createElement('details');
      details.className = 'result-details';
      details.open = true;
      details.innerHTML = `<summary>结果摘要</summary><div class="tool-body">${escapeHtml(msg.output || '')}</div>`;
      card.appendChild(details);
    }
    if (msg.result && !card.querySelector('.evidence-details')) {
      const details = document.createElement('details');
      details.className = 'evidence-details';
      details.innerHTML = `<summary>结构化证据</summary><div class="tool-body">${escapeHtml(formatPayload(msg.result))}</div>`;
      card.appendChild(details);
    }
  }
}

function markRunningToolsStopped() {
  document.querySelectorAll('.tool-card.running').forEach(card => {
    card.className = 'tool-card stopped';
    const badge = card.querySelector('.badge');
    if (badge) {
      badge.className = 'badge stopped';
      badge.textContent = '已停止';
    }
  });
}

function updateStages(scan = activeSession().scan) {
  document.querySelectorAll('.step').forEach(step => {
    const stage = step.dataset.stage;
    step.className = 'step';
    const status = scan?.stages?.[stage];
    if (status === 'completed') step.classList.add('done');
    if (status === 'active') step.classList.add('active');
  });
}

function formatDuration(milliseconds) {
  const seconds = Math.max(0, Math.floor((milliseconds || 0) / 1000));
  const minutes = Math.floor(seconds / 60);
  return minutes ? `${minutes}m ${String(seconds % 60).padStart(2, '0')}s` : `${seconds}s`;
}

function formatRate(value) {
  return typeof value === 'number' ? `${(value * 100).toFixed(1)}%` : '--';
}

function formatTokens(value) {
  return new Intl.NumberFormat('zh-CN').format(Number(value || 0));
}

function formatCost(value) {
  return typeof value === 'number' ? `$${value.toFixed(4)}` : '--';
}

function formatRunTime(value) {
  if (!value) return '--';
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
}

function metricItem(value, label, note = '') {
  return `<div class="metric-item"><div class="metric-value">${escapeHtml(value)}</div><div class="metric-label">${escapeHtml(label)}</div>${note ? `<div class="metric-note">${escapeHtml(note)}</div>` : ''}</div>`;
}

function renderMetrics(data) {
  const runs = data?.runs || {};
  const actions = data?.actions || {};
  const first = data?.first_effective_action || {};
  const solve = data?.solve_rate || {};
  const usage = data?.model_usage || {};
  metricsSummary.innerHTML = [
    metricItem(`${runs.completed || 0} / ${runs.total || 0}`, '已完成运行'),
    metricItem(formatRate(actions.tool_failure_rate), '工具失败率', `${actions.tool_errors || 0} / ${actions.total || 0}`),
    metricItem(formatRate(actions.protocol_failure_rate), '协议失败率', `${actions.protocol_failures || 0} / ${actions.total || 0}`),
    metricItem(formatRate(first.rate), '首次有效行动', `${first.effective || 0} / ${first.attempts || 0}`),
    metricItem(formatRate(solve.rate), '已验证 solve', `${solve.solved || 0} / ${solve.evaluated || 0}`),
    metricItem(formatTokens(usage.input_tokens) + ' / ' + formatTokens(usage.output_tokens), '输入 / 输出 token', `成本 ${formatCost(usage.cost_usd)}`)
  ].join('');

  const categories = Object.entries(data?.by_category || {});
  if (!categories.length) {
    metricsCategories.className = 'empty';
    metricsCategories.textContent = '尚无已记录运行。';
    return;
  }
  metricsCategories.className = 'metrics-table-wrap';
  metricsCategories.innerHTML = `<table class="metrics-table"><thead><tr><th>能力域</th><th>运行</th><th>工具失败</th><th>首次有效</th><th>solve</th><th>Token</th></tr></thead><tbody>${categories.map(([name, item]) => {
    const categoryRuns = item.runs || {};
    const categoryActions = item.actions || {};
    const categoryFirst = item.first_effective_action || {};
    const categorySolve = item.solve_rate || {};
    const categoryUsage = item.model_usage || {};
    return `<tr><td>${escapeHtml(name)}</td><td>${categoryRuns.completed || 0}/${categoryRuns.total || 0}</td><td>${formatRate(categoryActions.tool_failure_rate)}</td><td>${formatRate(categoryFirst.rate)}</td><td>${formatRate(categorySolve.rate)}</td><td>${formatTokens(categoryUsage.input_tokens + categoryUsage.output_tokens)}</td></tr>`;
  }).join('')}</tbody></table>`;
}

function renderRuns(runs) {
  if (!Array.isArray(runs) || !runs.length) {
    runList.className = 'empty';
    runList.textContent = '尚无已记录运行。';
    return;
  }
  runList.className = 'run-list';
  runList.innerHTML = runs.map(run => `
    <button class="run-row ${run.id === selectedRunId ? 'active' : ''}" data-run-id="${escapeHtml(run.id)}" type="button">
      <span><span class="run-title">${escapeHtml(run.target || run.input_text || run.id)}</span><span class="run-meta">${escapeHtml(run.category || 'web')} · ${escapeHtml(run.mode || 'production')} · ${escapeHtml(formatRunTime(run.started_at))}</span></span>
      <span class="run-status ${escapeHtml(run.status || '')}">${escapeHtml(run.status || 'unknown')}</span>
    </button>
  `).join('');
  runList.querySelectorAll('[data-run-id]').forEach(button => {
    button.onclick = () => loadRunDetail(button.dataset.runId);
  });
}

function renderRunDetail(run) {
  const actions = Array.isArray(run.actions) ? run.actions : [];
  const usage = Array.isArray(run.model_usage) ? run.model_usage : [];
  const inputTokens = usage.reduce((sum, item) => sum + Number(item.input_tokens || 0), 0);
  const outputTokens = usage.reduce((sum, item) => sum + Number(item.output_tokens || 0), 0);
  const evaluation = run.evaluation;
  runDetail.className = 'metrics-detail';
  runDetail.innerHTML = `
    <div class="metrics-detail-head"><span>${escapeHtml(run.category || 'web')} · ${escapeHtml(run.mode || 'production')}</span><span>${escapeHtml(run.status || 'unknown')}</span></div>
    <div class="run-meta">${escapeHtml(run.target || run.input_text || '')}</div>
    <div class="run-meta">${actions.length} 个行动 · ${formatTokens(inputTokens)} / ${formatTokens(outputTokens)} token${evaluation ? ` · ${escapeHtml(evaluation.outcome)}${evaluation.verified ? '（已验证）' : ''}` : ''}</div>
    ${actions.length ? actions.map(action => `
      <div class="action-row">
        <div class="action-row-head"><span>${escapeHtml(action.tool_name)}</span><span>${escapeHtml(action.status)}${action.duration_ms != null ? ` · ${formatDuration(action.duration_ms)}` : ''}</span></div>
        <div class="action-row-meta">${action.protocol_error ? `协议：${escapeHtml(action.protocol_error)}` : action.effective === 1 ? '产生有效观察' : action.effective === 0 ? '未产生有效观察' : '未判定有效性'}</div>
        ${action.output_excerpt ? `<details><summary>输出摘要</summary><div class="tool-body">${escapeHtml(action.output_excerpt)}</div></details>` : ''}
      </div>
    `).join('') : '<div class="empty">该运行没有工具行动。</div>'}
  `;
}

async function loadRunDetail(runId) {
  if (!runId) return;
  selectedRunId = runId;
  runDetail.className = 'empty';
  runDetail.textContent = '正在加载运行详情…';
  try {
    const response = await fetch(`/api/runs/${encodeURIComponent(runId)}`);
    if (!response.ok) throw new Error('无法读取运行详情');
    renderRunDetail(await response.json());
    runList.querySelectorAll('[data-run-id]').forEach(button => {
      button.classList.toggle('active', button.dataset.runId === runId);
    });
  } catch (error) {
    runDetail.className = 'empty';
    runDetail.textContent = error.message || '读取运行详情失败。';
  }
}

async function refreshTelemetry() {
  refreshMetricsBtn.disabled = true;
  try {
    const [metricsResponse, runsResponse] = await Promise.all([
      fetch('/api/metrics'),
      fetch('/api/runs?limit=50')
    ]);
    if (!metricsResponse.ok || !runsResponse.ok) throw new Error('无法读取运行指标');
    renderMetrics(await metricsResponse.json());
    renderRuns((await runsResponse.json()).runs || []);
  } catch (error) {
    metricsSummary.innerHTML = metricItem('--', '指标不可用', error.message || '读取失败');
    metricsCategories.className = 'empty';
    metricsCategories.textContent = '无法读取能力域统计。';
    runList.className = 'empty';
    runList.textContent = '无法读取历史运行。';
  } finally {
    refreshMetricsBtn.disabled = false;
  }
}

async function openMetrics() {
  metricsOverlay.classList.add('open');
  await refreshTelemetry();
}

function closeMetrics() {
  metricsOverlay.classList.remove('open');
}

function renderScanState(scan) {
  if (!scan) {
    scanStateRail.className = 'empty';
    scanStateRail.textContent = '等待扫描任务。';
    scanElapsed.textContent = '';
    return;
  }
  const elapsed = scan.status === 'running'
    ? Date.now() - (scan.started_at || Date.now())
    : scan.elapsed_ms || 0;
  scanElapsed.textContent = formatDuration(elapsed);
  const rows = Object.entries(STAGE_LABELS).map(([stage, label]) => {
    const status = scan.stages?.[stage] || 'pending';
    return `<div class="stage-row ${status}"><span>${label}</span><span class="stage-state">${STAGE_STATUS_LABELS[status] || status}</span></div>`;
  }).join('');
  scanStateRail.className = '';
  scanStateRail.innerHTML = `
    <div class="scan-target">${escapeHtml(scan.target || '未识别目标')}</div>
    <div class="scan-summary">
      <div class="scan-stat"><strong>${scan.tool_count || 0}</strong><span>工具</span></div>
      <div class="scan-stat"><strong>${scan.finding_count || 0}</strong><span>发现</span></div>
      <div class="scan-stat"><strong>${scan.error_count || 0}</strong><span>错误</span></div>
    </div>
    <div class="stage-list">${rows}</div>
  `;
}

function renderFindingCards(findings) {
  findingRail.innerHTML = '';
  if (!Array.isArray(findings) || !findings.length) {
    findingRail.className = 'empty';
    findingRail.textContent = '等待结构化发现。';
    return;
  }
  findingRail.className = '';
  findings.slice(0, 20).forEach(item => {
    const finding = item.finding || item;
    const evidence = finding.evidence || [];
    const reproduction = finding.reproduction || [];
    const card = document.createElement('div');
    const level = finding.severity || 'info';
    card.className = `finding-card ${level}`;
    card.innerHTML = `
      <strong>${escapeHtml(finding.title || '未命名发现')}</strong>
      <div class="finding-meta">${escapeHtml(finding.category || 'observation')} · ${escapeHtml(finding.confidence || 'info')}</div>
      <details><summary>证据与复现</summary><div class="tool-body">${escapeHtml(formatPayload({ evidence, reproduction }))}</div></details>
    `;
    findingRail.appendChild(card);
  });
}

function applyScanSnapshot(snapshot) {
  if (!snapshot || !snapshot.id) return null;
  const session = activeSession();
  const previous = session.scan?.id === snapshot.id ? session.scan : null;
  session.scan = {
    ...snapshot,
    findings: previous?.findings || []
  };
  renderScanState(session.scan);
  updateStages(session.scan);
  return session.scan;
}

function onScanStarted(msg) {
  const session = activeSession();
  session.tools = [];
  session.scan = { ...(msg.scan || {}), findings: [] };
  toolCards.clear();
  renderToolHistory();
  renderScanState(session.scan);
  updateStages(session.scan);
  saveSessions();
}

function onStageEvent(msg) {
  applyScanSnapshot(msg.scan);
  if (msg.type === 'stage_progress' && msg.duration_ms != null && msg.run_id) {
    const tool = activeSession().tools.find(item => item.id === msg.run_id);
    if (tool) {
      tool.durationMs = msg.duration_ms;
      const previous = toolCards.get(msg.run_id);
      if (previous) {
        const replacement = buildToolCard(tool);
        previous.replaceWith(replacement);
        toolCards.set(msg.run_id, replacement);
      }
    }
  }
  saveSessions();
}

function onFindingCreated(msg) {
  const scan = applyScanSnapshot(msg.scan);
  if (!scan || !msg.finding) return;
  if (!scan.findings.some(item => item.id === msg.finding_id)) {
    scan.findings.push({ id: msg.finding_id, tool: msg.tool, finding: msg.finding });
  }
  renderFindingCards(scan.findings);
  saveSessions();
}

function onScanFinished(msg) {
  const scan = applyScanSnapshot(msg.scan);
  if (scan?.status === 'stopped') markRunningToolsStopped();
  saveSessions();
  if (metricsOverlay.classList.contains('open')) refreshTelemetry();
}

function syncThinkingControls() {
  reasoningEffort.disabled = !thinkingEnabled.checked;
  showReasoning.disabled = !thinkingEnabled.checked;
}

async function loadConfig() {
  try {
    const response = await fetch('/api/config');
    if (!response.ok) throw new Error('无法读取配置');
    const config = await response.json();
    if (![...modelSelect.options].some(option => option.value === config.model)) {
      const option = document.createElement('option');
      option.value = config.model;
      option.textContent = config.model;
      modelSelect.appendChild(option);
    }
    modelSelect.value = config.model;
    thinkingEnabled.checked = Boolean(config.thinking_enabled);
    reasoningEffort.value = config.reasoning_effort || 'high';
    showReasoning.checked = Boolean(config.show_reasoning);
    maxTurns.value = config.max_turns || 120;
    historyMessageLimit.value = config.history_message_limit || 24;
    syncThinkingControls();
    configStatus.textContent = '';
  } catch (error) {
    configStatus.textContent = error.message || '配置读取失败';
  }
}

async function saveConfig(event) {
  event.preventDefault();
  const payload = {
    model: modelSelect.value,
    thinking_enabled: thinkingEnabled.checked,
    reasoning_effort: reasoningEffort.value,
    show_reasoning: showReasoning.checked,
    max_turns: Number(maxTurns.value),
    history_message_limit: Number(historyMessageLimit.value)
  };
  configStatus.textContent = '正在保存…';
  try {
    const response = await fetch('/api/config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.detail || '配置保存失败');
    configStatus.textContent = '已保存，将在下一次扫描生效。';
    setTimeout(() => configDialog.close(), 500);
  } catch (error) {
    configStatus.textContent = error.message || '配置保存失败';
  }
}

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => setStatus(true, '已连接');
  ws.onclose = () => {
    setStatus(false, '断开，重连中');
    setBusy(false);
    setTimeout(connect, 2500);
  };
    ws.onerror = () => setStatus(false, '连接错误');
    ws.onmessage = event => {
      const msg = JSON.parse(event.data);
      if (msg.type === 'scan_started') {
        onScanStarted(msg);
      } else if (msg.type === 'stage_started' || msg.type === 'stage_progress') {
        onStageEvent(msg);
      } else if (msg.type === 'finding_created') {
        onFindingCreated(msg);
      } else if (msg.type === 'scan_finished') {
        onScanFinished(msg);
      } else if (msg.type === 'reasoning') {
        appendReasoning(msg.content || '');
      } else if (msg.type === 'token') {
        if (!currentAssistant) {
        currentAssistantRaw = '';
        currentAssistant = addMessage('assistant', '', false);
      }
      currentAssistantRaw += msg.content || '';
      currentAssistant.innerHTML = renderMarkdown(currentAssistantRaw);
      conversation.scrollTop = conversation.scrollHeight;
      } else if (msg.type === 'tool_started') {
        onToolStart(msg);
      } else if (msg.type === 'tool_finished') {
        onToolEnd(msg);
      } else if (msg.type === 'done') {
        if (currentAssistantRaw) {
          activeSession().messages.push({ role: 'assistant', content: currentAssistantRaw, at: Date.now() });
        }
        currentAssistant = null;
        currentAssistantRaw = '';
        resetReasoning();
        setBusy(false);
      saveSessions();
      input.focus();
      } else if (msg.type === 'stopped') {
      if (currentAssistantRaw) {
        activeSession().messages.push({ role: 'assistant', content: currentAssistantRaw, at: Date.now() });
      }
        markRunningToolsStopped();
        currentAssistant = null;
        currentAssistantRaw = '';
        resetReasoning();
        setBusy(false);
      saveSessions();
        addMessage('assistant', msg.content || '扫描已停止');
      input.focus();
    } else if (msg.type === 'info') {
      addMessage('assistant', msg.content || '');
      } else if (msg.type === 'error') {
        if (currentAssistantRaw) {
          activeSession().messages.push({ role: 'assistant', content: currentAssistantRaw, at: Date.now() });
          saveSessions();
        }
        currentAssistant = null;
        currentAssistantRaw = '';
        resetReasoning();
        addMessage('assistant', `错误：${msg.content || 'unknown error'}`);
        setBusy(false);
    }
  };
}

function send() {
  const text = input.value.trim();
  if (!text || busy || !ws || ws.readyState !== WebSocket.OPEN) return;
  const session = activeSession();
  if (session.title === '新扫描') {
    session.title = text.length > 42 ? `${text.slice(0, 42)}...` : text;
    persistSessionTitle(session).catch(error => window.alert(error.message || '保存会话名称失败'));
  }
  addMessage('user', text);
  input.value = '';
  currentAssistant = null;
  currentAssistantRaw = '';
  resetReasoning();
  session.scan = null;
  session.tools = [];
  renderScanState(null);
  updateStages(null);
  setBusy(true);
  saveSessions();
  ws.send(JSON.stringify({ content: text, conversation_id: session.id }));
}

function stopScan() {
  if (!busy || !ws || ws.readyState !== WebSocket.OPEN) return;
  stopBtn.disabled = true;
  ws.send(JSON.stringify({ command: 'stop' }));
}

async function renameSession(sessionId) {
  const session = sessions.find(item => item.id === sessionId);
  if (!session) return;
  const title = window.prompt('扫描名称', session.title);
  if (title == null) return;
  const normalized = title.trim().slice(0, 80);
  if (!normalized) return;
  session.title = normalized;
  await persistSessionTitle(session);
  saveSessions();
}

async function deleteSession(sessionId) {
  const session = sessions.find(item => item.id === sessionId);
  if (!session || !window.confirm(`删除“${session.title}”？`)) return;
  const response = await fetch(`/api/conversations/${encodeURIComponent(sessionId)}`, { method: 'DELETE' });
  if (!response.ok) throw new Error('删除会话失败');
  sessions = sessions.filter(item => item.id !== sessionId);
  if (!sessions.length) {
    const replacement = await createSession();
    activeId = replacement.id;
  } else if (activeId === sessionId) {
    await selectSession(sessions[0].id);
  }
  saveSessions();
  renderConversation();
}

function exportActiveSession() {
  const session = activeSession();
  const payload = {
    exported_at: new Date().toISOString(),
    format: 'my-agent-scan-v1.7.1',
    session
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `my-agent-scan-${new Date().toISOString().replaceAll(':', '-')}.json`;
  link.click();
  URL.revokeObjectURL(url);
}

// ── 工具目录 (Tool Inventory) ─────────────────────────────────

function getToolCategoryIcon(cat) {
  const icons = {
    'HTTP 基础': '🌐', '攻击面测绘': '🔍', '注入验证': '💉',
    'SSRF 检测': '🔄', 'JWT 攻击': '🔑', '授权攻击': '🛡️',
    'OOB 外带确认': '📡', '高级利用': '⚡', '自进化技能': '🧬', '已学习技能': '🧠',
  };
  return icons[cat] || '🔧';
}

async function loadToolInventory() {
  if (toolInventory) return toolInventory;
  try {
    const resp = await fetch('/api/tools');
    if (!resp.ok) throw new Error('API error');
    toolInventory = await resp.json();
    toolInventory.skill_total = 0;

    const skillsResp = await fetch('/api/skills');
    if (skillsResp.ok) {
      const skillsData = await skillsResp.json();
      const skills = skillsData.skills || [];
      toolInventory.skill_total = skills.length;
      if (skills.length) {
        toolInventory.categories.push({
          category: '已学习技能',
          tools: skills.map(skill => ({
            name: skill.name,
            description: `${skill.description} [${skill.category} | ${skill.state}]${skill.tags?.length ? ` #${skill.tags.join(' #')}` : ''}`,
            params: [],
          })),
        });
      }
    }
  } catch (err) {
    toolInventory = { total: 0, skill_total: 0, categories: [], version: '?' };
  }
  return toolInventory;
}

async function renderToolInventory(filter = '') {
  const data = await loadToolInventory();
  const skillTotal = data.skill_total || 0;
  const inventoryTotal = data.total + skillTotal;
  toolsCount.textContent = skillTotal
    ? `${data.total} 个工具 · ${skillTotal} 个已学习技能`
    : `共 ${data.total} 个工具`;
  toolsFooterCount.textContent = `v${data.version} · ${data.total} tools · ${skillTotal} skills`;

  const q = filter.trim().toLowerCase();
  let visibleTotal = 0;

  toolsBody.innerHTML = data.categories.map(cat => {
    const filtered = q
      ? cat.tools.filter(t =>
          t.name.toLowerCase().includes(q) ||
          t.description.toLowerCase().includes(q) ||
          t.params.some(p => p.name.toLowerCase().includes(q))
        )
      : cat.tools;

    if (!filtered.length) return '';
    visibleTotal += filtered.length;

    const chips = filtered.map(t => `
      <div class="tool-chip">
        <div class="chip-name">${escapeHtml(t.name)}</div>
        <div class="chip-desc">${escapeHtml(t.description)}</div>
        ${t.params.length ? `<div class="chip-params">
          ${t.params.map(p =>
            `<span class="chip-param ${p.required ? 'required' : ''}" title="${escapeHtml(p.description)}">${escapeHtml(p.name)}${p.required ? '*' : ''}:${escapeHtml(p.type)}</span>`
          ).join('')}
        </div>` : ''}
      </div>
    `).join('');

    return `
      <div class="tool-group">
        <h3>${getToolCategoryIcon(cat.category)} ${cat.category} <span class="count">${filtered.length} tools</span></h3>
        <div class="tool-grid">${chips}</div>
      </div>
    `;
  }).join('');

  if (!toolsBody.innerHTML.trim()) {
    toolsBody.innerHTML = `<div class="empty">未找到匹配 "${escapeHtml(filter)}" 的工具。</div>`;
  }

  toolsCount.textContent = q
    ? `匹配 ${visibleTotal} / ${inventoryTotal} 项`
    : (skillTotal ? `${data.total} 个工具 · ${skillTotal} 个已学习技能` : `共 ${data.total} 个工具`);
}
