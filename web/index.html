<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web 漏洞审查 Agent v0.5</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4eb;
    --text-dim: #8b8fa3;
    --accent: #4ade80;
    --danger: #f87171;
    --warn: #fbbf24;
    --info: #60a5fa;
    --radius: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
  }
  .dot.on { background: var(--accent); }
  .dot.off { background: var(--danger); }

  /* chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  .msg.user {
    align-self: flex-end;
    background: #2563eb;
    color: #fff;
    border-bottom-right-radius: 2px;
  }
  .msg.agent {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
  }
  .msg.info {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 12px;
  }
  .msg .risk-high { color: var(--danger); font-weight: 600; }
  .msg .risk-mid { color: var(--warn); font-weight: 600; }
  .msg .risk-low { color: var(--accent); font-weight: 600; }

  /* typing indicator */
  .typing { color: var(--text-dim); font-size: 12px; padding: 4px 16px; }
  .typing span { animation: blink 1s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }

  /* input area */
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    flex-shrink: 0;
  }
  #input-row {
    display: flex;
    gap: 10px;
  }
  #user-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    resize: none;
    font-family: inherit;
  }
  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--text-dim); }
  button {
    padding: 10px 16px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  #send-btn { background: var(--accent); color: #000; }
  #send-btn:hover { opacity: 0.9; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #clear-btn { background: var(--border); color: var(--text); }
  #clear-btn:hover { opacity: 0.8; }

  /* prompt hint */
  .hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 8px;
  }

  /* scrollbar */
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* responsive */
  @media (max-width: 600px) {
    header h1 { font-size: 15px; }
    .msg { max-width: 95%; font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <h1>🔍 Web 漏洞审查 Agent v0.5</h1>
  <div class="status">
    <span class="dot off" id="dot"></span>
    <span id="status-text">未连接</span>
  </div>
</header>

<div id="chat">
  <div class="msg info">输入要扫描的 URL 开始安全审计</div>
</div>

<footer>
  <div id="input-row">
    <input id="user-input" placeholder="输入目标 URL，例如 http://49.232.142.230:13403" autofocus>
    <button id="send-btn">发送</button>
    <button id="clear-btn">清空</button>
  </div>
  <div class="hint">输入 URL → Agent 自动爬取 + 扫描 + 知识库验证 → 输出漏洞报告 ｜ 输入 <code>/clear</code> 清空会话 ｜ v0.5 RAG 知识库</div>
</footer>

<script>
const WS_URL = `ws://${location.host}/api/chat`;
let ws = null;
let currentAgentMsg = null;

const chat = document.getElementById('chat');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const clearBtn = document.getElementById('clear-btn');
const dot = document.getElementById('dot');
const statusText = document.getElementById('status-text');

function addMsg(role, html) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function setStatus(on, text) {
  dot.className = 'dot ' + (on ? 'on' : 'off');
  statusText.textContent = text;
}

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => setStatus(true, '已连接');
  ws.onclose = () => {
    setStatus(false, '断开 — 5秒后重连');
    setTimeout(connect, 5000);
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'token') {
      if (!currentAgentMsg) {
        currentAgentMsg = addMsg('agent', '');
      }
      // 简单 markdown 渲染: **粗体** + `code` + 换行 → <br>
      let html = msg.content
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/🔴/g, '<span class="risk-high">🔴</span>')
        .replace(/🟡/g, '<span class="risk-mid">🟡</span>')
        .replace(/🟢/g, '<span class="risk-low">🟢</span>')
        .replace(/\n/g, '<br>');
      currentAgentMsg.innerHTML += html;
      chat.scrollTop = chat.scrollHeight;
    } else if (msg.type === 'done') {
      currentAgentMsg = null;
      sendBtn.disabled = false;
      input.disabled = false;
      input.focus();
    } else if (msg.type === 'info') {
      addMsg('info', msg.content);
    } else if (msg.type === 'error') {
      addMsg('info', '❌ ' + msg.content);
      currentAgentMsg = null;
      sendBtn.disabled = false;
      input.disabled = false;
    }
  };
}

function send() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  if (text === '/clear') {
    ws.send(JSON.stringify({ command: 'clear' }));
    addMsg('info', '🧹 会话已清空');
    chat.innerHTML = '<div class="msg info">会话已清空，输入 URL 开始新扫描</div>';
    input.value = '';
    input.focus();
    return;
  }

  addMsg('user', text.replace(/&/g,'&amp;').replace(/</g,'&lt;'));
  currentAgentMsg = null;
  sendBtn.disabled = true;
  input.disabled = true;
  input.value = '';
  ws.send(JSON.stringify({ content: text }));
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);
clearBtn.addEventListener('click', () => {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ command: 'clear' }));
    chat.innerHTML = '<div class="msg info">会话已清空，输入 URL 开始新扫描</div>';
  }
});

connect();
input.focus();
</script>
</body>
</html>
